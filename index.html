<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Login</title>
    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/login-signup.css">
    <link rel="stylesheet" href="./styles/welcome.css">
    <script src="./js/data.js"></script>

<body onload="init()">
    <div id="animation" class="animation">
        <img class="animation-logo logo" src="./assets/icons/Join-main-logo.png" alt="">
    </div>    
    <main>
        <div class="welcome-container">
            <span class="background-text">Not a Join user? <a href="./html/sign_up.html">Sign up</a></span>
            <h1>Welcome</h1>
            <div class="border-blue"></div>
            <span class="welcome-text">Pick the option that suits your role: create a request as a stakeholder or log in if you’re part of
                the team.</span>
            <div class="welcome-options">
                <a href="./html/stakeholder.html"><p class="btn-p"><img src="./assets/icons/welcome/Create-request.png">Are you a stakeholder?</p><button class="create-request-btn btn-font" onclick="toStakeholder()">Create Request</button></a>
                <a href="./html/log_in.html"><p class="btn-p"><img src="./assets/icons/welcome/Member-log-in.png">Are you part of the team?</p><button class="member-login-btn btn-font">Member Log In</button></a>
            </div>
        </div>
        <footer>
        <div class="footer-content">
            <a href="../html/privacy_policy.html">Privacy Policy</a>
            <a href="../html/legal_notice.html">Legal notice</a>
        </div>
    </footer>
    </main>
